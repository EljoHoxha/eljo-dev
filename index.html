<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const systemTheme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem('portfolio-theme');
        } catch {
          // Fall back to the operating-system preference.
        }
        const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : systemTheme;
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <meta
      name="description"
      content="A modern futuristic portfolio for digital product, frontend, and AI-powered web experiences."
    />
    <title>Eljo Hoxha | Future Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
